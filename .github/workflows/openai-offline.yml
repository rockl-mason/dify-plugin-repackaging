name: Repackage OpenAI Plugin

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/openai-offline.yml
  workflow_dispatch:
    inputs:
      plugin_version:
        description: "OpenAI plugin version"
        required: true
        default: "0.3.3"
        type: string
      platform_arm:
        description: "Use ARM platform (true = manylinux_2_17_aarch64, false = manylinux_2_17_x86_64)"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

env:
  PLUGIN_AUTHOR: langgenius
  PLUGIN_NAME: openai
  MARKETPLACE_API_URL: https://marketplace.dify.ai

jobs:
  repackage:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve inputs
        run: |
          PLUGIN_VERSION="${{ github.event.inputs.plugin_version }}"
          if [ -z "$PLUGIN_VERSION" ]; then
            PLUGIN_VERSION="0.3.3"
          fi

          PLATFORM_ARM="${{ github.event.inputs.platform_arm }}"
          if [ -z "$PLATFORM_ARM" ]; then
            PLATFORM_ARM="false"
          fi

          echo "PLUGIN_VERSION=$PLUGIN_VERSION" >> "$GITHUB_ENV"
          echo "PLATFORM_ARM=$PLATFORM_ARM" >> "$GITHUB_ENV"

          if [ "$PLATFORM_ARM" = "true" ]; then
            echo "PIP_PLATFORM=manylinux_2_17_aarch64" >> "$GITHUB_ENV"
            echo "PACKAGE_SUFFIX=openai-offline-arm64" >> "$GITHUB_ENV"
          else
            echo "PIP_PLATFORM=manylinux_2_17_x86_64" >> "$GITHUB_ENV"
            echo "PACKAGE_SUFFIX=openai-offline-x86_64" >> "$GITHUB_ENV"
          fi

      - name: Print workflow inputs
        run: |
          echo "plugin_author  = ${{ env.PLUGIN_AUTHOR }}"
          echo "plugin_name    = ${{ env.PLUGIN_NAME }}"
          echo "plugin_version = ${{ env.PLUGIN_VERSION }}"
          echo "platform_arm   = ${{ env.PLATFORM_ARM }}"
          echo "pip_platform   = ${{ env.PIP_PLATFORM }}"

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Download original plugin package
        run: |
          curl -L \
            -o "${{ env.PLUGIN_AUTHOR }}-${{ env.PLUGIN_NAME }}_${{ env.PLUGIN_VERSION }}.difypkg" \
            "${{ env.MARKETPLACE_API_URL }}/api/v1/plugins/${{ env.PLUGIN_AUTHOR }}/${{ env.PLUGIN_NAME }}/${{ env.PLUGIN_VERSION }}/download"

      - name: Unpack plugin package
        run: |
          unzip -o "${{ env.PLUGIN_AUTHOR }}-${{ env.PLUGIN_NAME }}_${{ env.PLUGIN_VERSION }}.difypkg" -d plugin-src
          ls -la plugin-src | sed -n '1,80p'

      - name: Download Python wheels
        run: |
          mkdir -p plugin-src/wheels
          python -m pip download \
            --dest plugin-src/wheels \
            --index-url https://pypi.org/simple \
            --only-binary=:all: \
            --platform "${{ env.PIP_PLATFORM }}" \
            --python-version 312 \
            --implementation cp \
            --abi cp312 \
            -r plugin-src/requirements.txt

      - name: Force requirements-based offline install
        run: |
          python - <<'PY'
          from pathlib import Path
          req = Path('plugin-src/requirements.txt')
          content = req.read_text()
          if '--no-index --find-links=./wheels/' not in content:
              req.write_text('--no-index --find-links=./wheels/\n' + content)
          PY
          rm -f plugin-src/pyproject.toml plugin-src/uv.lock
          if [ -f plugin-src/.difyignore ]; then
            sed -i '/^wheels\//d' plugin-src/.difyignore
          fi
          if [ -f plugin-src/.gitignore ]; then
            sed -i '/^wheels\//d' plugin-src/.gitignore
          fi
          printf '\n--- plugin-src ---\n'
          find plugin-src -maxdepth 2 | sort | sed -n '1,120p'
          printf '\n--- requirements.txt ---\n'
          sed -n '1,40p' plugin-src/requirements.txt

      - name: Package offline plugin
        run: |
          chmod +x ./dify-plugin-linux-amd64
          ./dify-plugin-linux-amd64 plugin package \
            plugin-src \
            -o "${{ env.PLUGIN_AUTHOR }}-${{ env.PLUGIN_NAME }}_${{ env.PLUGIN_VERSION }}-${{ env.PACKAGE_SUFFIX }}.difypkg" \
            --max-size 5120

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PLUGIN_AUTHOR }}-${{ env.PLUGIN_NAME }}_${{ env.PLUGIN_VERSION }}-${{ env.PACKAGE_SUFFIX }}.difypkg
          path: ${{ env.PLUGIN_AUTHOR }}-${{ env.PLUGIN_NAME }}_${{ env.PLUGIN_VERSION }}-${{ env.PACKAGE_SUFFIX }}.difypkg
