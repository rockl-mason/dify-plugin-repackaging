name: Repackage Agent Skill Plugin

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/agent-skill-plugin-offline.yml
      - scripts/package_plugin_offline.sh
  workflow_dispatch:
    inputs:
      plugin_version:
        description: "Agent Skill Plugin version"
        required: true
        default: "1.0.0"
        type: string
      platform_arm:
        description: "Use ARM platform (true = manylinux_2_17_aarch64, false = manylinux_2_17_x86_64)"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: write

env:
  PLUGIN_AUTHOR: xun404
  PLUGIN_NAME: agent-skill-plugin
  MARKETPLACE_API_URL: https://marketplace.dify.ai

jobs:
  repackage:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve inputs
        run: |
          PLUGIN_VERSION="${{ github.event.inputs.plugin_version }}"
          if [ -z "$PLUGIN_VERSION" ]; then
            PLUGIN_VERSION="1.0.0"
          fi

          PLATFORM_ARM="${{ github.event.inputs.platform_arm }}"
          if [ -z "$PLATFORM_ARM" ]; then
            PLATFORM_ARM="false"
          fi

          echo "PLUGIN_VERSION=$PLUGIN_VERSION" >> "$GITHUB_ENV"

          if [ "$PLATFORM_ARM" = "true" ]; then
            echo "PIP_PLATFORM=manylinux_2_17_aarch64" >> "$GITHUB_ENV"
            echo "PACKAGE_SUFFIX=offline-arm64" >> "$GITHUB_ENV"
          else
            echo "PIP_PLATFORM=manylinux_2_17_x86_64" >> "$GITHUB_ENV"
            echo "PACKAGE_SUFFIX=offline-x86_64" >> "$GITHUB_ENV"
          fi

      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Package plugin
        run: |
          chmod +x ./scripts/package_plugin_offline.sh
          ./scripts/package_plugin_offline.sh

      - name: Publish raw difypkg to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: ${{ env.RELEASE_NAME }}
          files: ${{ env.OUTPUT_FILE }}
          overwrite_files: true
          make_latest: false
